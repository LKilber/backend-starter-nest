version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: backend_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: backend_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: backend_api
    command: pnpm start:prod
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: backend_worker
    command: node dist/apps/worker/server.js
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: